; PlatformIO Project Configuration File
; M5StickC Plus2 + SST LuminOx LOX-02 Oxygen Sensor
;
; WIRING (Grove / HY2.0-4P port):
;   Grove Black  -> GND  (Sensor Pin 2: GND)
;   Grove Red    -> 5V   (Sensor Pin 1: Vs +5V)
;   Grove Yellow -> G32  (Sensor Pin 3: TX out of sensor -> RX into ESP32)
;   Grove White  -> G33  (Sensor Pin 4: RX into sensor  -> TX out of ESP32)
;
; NOTE: Always apply power (pins 1 & 2) BEFORE communicating (pins 3 & 4).

[env:m5stack-stickc-plus2]
platform    = espressif32@6.7.0
board       = m5stick-c
framework   = arduino

upload_speed  = 1500000
monitor_speed = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=5

lib_deps =
    M5Unified=https://github.com/m5stack/M5Unified